services:
  postgres:
    image: postgres:16
    command: ["postgres", "-c", "wal_level=logical", "-c", "max_wal_senders=10", "-c", "max_replication_slots=10"]
    environment:
      POSTGRES_USER: payment
      POSTGRES_PASSWORD: payment
      POSTGRES_DB: payment
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payment -d payment"]
      interval: 2s
      timeout: 3s
      retries: 30
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  db-migrate:
    build:
      context: ./infra/db-migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://payment:payment@postgres:5432/payment
    restart: "no"

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "${ZOOKEEPER_HOST_PORT:-2181}:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    ports:
      - "${KAFKA_HOST_PORT:-9092}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

  kafka-connect:
    image: debezium/connect:2.6
    depends_on:
      - kafka
      - postgres
    ports:
      - "${KAFKA_CONNECT_HOST_PORT:-8083}:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_statuses
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter

  debezium-init:
    image: curlimages/curl:8.7.1
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      kafka-connect:
        condition: service_started
    entrypoint: ["/bin/sh", "-c"]
    command: >
      echo 'Waiting for Kafka Connect...' &&
      until curl -sf http://kafka-connect:8083/connectors >/dev/null; do sleep 2; done &&
      echo 'Registering Postgres connector...' &&
      curl -sS -X POST http://kafka-connect:8083/connectors -H 'Content-Type: application/json' --data-binary @/connector-config.json || true &&
      echo 'Done.'
    volumes:
      - ./infra/debezium/connector-config.json:/connector-config.json:ro

  redis:
    image: redis:7
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"

  api-gateway:
    build:
      context: ./services/api-gateway
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
      payment-intent-service:
        condition: service_started
      transaction-service:
        condition: service_started
    environment:
      PORT: 3000
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgres://payment:payment@postgres:5432/payment
      PAYMENT_INTENT_SERVICE_URL: http://payment-intent-service:3001
      TRANSACTION_SERVICE_URL: http://transaction-service:3002
      WEBHOOK_SERVICE_URL: http://webhook-service:3003
      DEV_SIGNING_ENABLED: "true"
    ports:
      - "${API_GATEWAY_HOST_PORT:-3000}:3000"

  payment-intent-service:
    build:
      context: ./services/payment-intent-service
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    environment:
      PORT: 3001
      DATABASE_URL: postgres://payment:payment@postgres:5432/payment

  transaction-service:
    build:
      context: ./services/transaction-service
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_started
    environment:
      PORT: 3002
      DATABASE_URL: postgres://payment:payment@postgres:5432/payment
      KAFKA_BROKERS: kafka:29092
      MOCK_NETWORK_LATENCY_MS: 200

  webhook-service:
    build:
      context: ./services/webhook-service
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_started
    environment:
      PORT: 3003
      DATABASE_URL: postgres://payment:payment@postgres:5432/payment
      KAFKA_BROKERS: kafka:29092
      WEBHOOK_MAX_ATTEMPTS: ${WEBHOOK_MAX_ATTEMPTS:-10}
    ports:
      - "${WEBHOOK_SERVICE_HOST_PORT:-3003}:3003"

  webhook-receiver:
    build:
      context: ./services/webhook-receiver
    environment:
      PORT: 4000
      FAIL_FIRST_N: ${WEBHOOK_RECEIVER_FAIL_FIRST_N:-2}
    ports:
      - "${WEBHOOK_RECEIVER_HOST_PORT:-4000}:4000"

  reconciliation-worker:
    build:
      context: ./services/reconciliation-worker
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://payment:payment@postgres:5432/payment
      RECONCILIATION_POLL_MS: ${RECONCILIATION_POLL_MS:-2000}
      RECONCILE_AFTER_MS: ${RECONCILE_AFTER_MS:-10000}

volumes:
  postgres_data:
